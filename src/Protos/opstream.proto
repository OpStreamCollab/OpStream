syntax = "proto3";

import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";

option csharp_namespace = "OpStream.Shared.Messages.gRPC";

package opstream;

service OpStreamService {
  rpc Connect (stream ClientMessage) returns (stream ServerMessage);
}

service OpStreamManagementService {
  rpc ListDocuments    (MgmtListDocumentsRequest) returns (MgmtListDocumentsResponse);
  rpc GetDocumentInfo  (MgmtDocumentRequest)      returns (MgmtGetDocumentInfoResponse);
  rpc GetSnapshot      (MgmtDocumentRequest)      returns (MgmtGetSnapshotResponse);
  rpc DeleteDocument   (MgmtDocumentRequest)      returns (MgmtOkResponse);
  rpc CompactDocument  (MgmtRevisionRequest)      returns (MgmtOkResponse);
  rpc ListMilestones   (MgmtDocumentRequest)      returns (MgmtListMilestonesResponse);
  rpc PurgeHistory     (MgmtRevisionRequest)      returns (MgmtOkResponse);
  rpc PurgeTenant      (MgmtEmptyRequest)         returns (MgmtCountResponse);
}

message ClientMessage {
  string correlation_id = 1;
  oneof message_type {
    JoinRequest join_request = 2;
    OpRequest op_request = 3;
    AwarenessRequest awareness_request = 4;
  }
}

message ServerMessage {
  string correlation_id = 1;
  oneof message_type {
    JoinResponse join_response = 2;
    OpResponse op_response = 3;
    ReceiveOpEvent receive_op_event = 4;
    ReceiveAwarenessEvent receive_awareness_event = 5;
    PeerDisconnectedEvent peer_disconnected_event = 6;
    ErrorResponse error_response = 7;
  }
}

message JoinRequest {
  string document_id = 1;
  string document_type = 2;
  int32 client_proto_version = 3;
}

message JoinResponse {
  int64 revision = 1;
  bytes snapshot = 2;
  repeated AwarenessStateProto awareness = 3;
}

message OpRequest {
  string document_id = 1;
  bytes payload = 2;
  int64 base_revision = 3;
}

message OpResponse {
  bool success = 1;
  int64 new_revision = 2;
  string error_message = 3;
}

message AwarenessRequest {
  string document_id = 1;
  string data_json = 2; 
}

message ErrorResponse {
  string message = 1;
}

message ReceiveOpEvent {
  bytes payload = 1;
  int64 new_revision = 2;
}

message ReceiveAwarenessEvent {
  repeated AwarenessStateProto awareness = 1;
}

message AwarenessStateProto {
  string peer_id = 1;
  string data_json = 2; 
  google.protobuf.Timestamp last_updated = 3;
}

message PeerDisconnectedEvent {
  string peer_id = 1;
}

// ─── Management messages ──────────────────────────────────────────────────────

message MgmtEmptyRequest {}

message MgmtDocumentRequest {
  string document_id = 1;
}

message MgmtRevisionRequest {
  string document_id   = 1;
  int64  up_to_revision = 2;
}

message MgmtListDocumentsRequest {
  google.protobuf.Int32Value skip = 1;
  google.protobuf.Int32Value take = 2;
}

message MgmtOkResponse {}

message MgmtCountResponse {
  int32 count = 1;
}

message MgmtDocumentInfoProto {
  string                    document_id   = 1;
  int64                     revision      = 2;
  google.protobuf.Timestamp last_modified = 3;
  int64                     op_count      = 4;
}

message MgmtSnapshotProto {
  int64                     revision  = 1;
  google.protobuf.Timestamp timestamp = 2;
  bytes                     state     = 3;
}

message MgmtMilestoneProto {
  int64                     revision  = 1;
  google.protobuf.Timestamp timestamp = 2;
  string                    name      = 3;
}

message MgmtListDocumentsResponse {
  repeated MgmtDocumentInfoProto documents = 1;
}

message MgmtGetDocumentInfoResponse {
  bool                   found         = 1;
  MgmtDocumentInfoProto  document_info = 2;
}

message MgmtGetSnapshotResponse {
  bool             found    = 1;
  MgmtSnapshotProto snapshot = 2;
}

message MgmtListMilestonesResponse {
  repeated MgmtMilestoneProto milestones = 1;
}

// ─── Versioning service ───────────────────────────────────────────────────────

service OpStreamVersioningService {
  rpc RegisterName          (VerRegisterNameRequest)   returns (VerNameInfoResponse);
  rpc ListNames             (VerEmptyRequest)           returns (VerListNamesResponse);
  rpc DeleteName            (VerDeleteNameRequest)      returns (VerOkResponse);
  rpc ListBranches          (VerNameRequest)            returns (VerListBranchesResponse);
  rpc ForkBranch            (VerForkBranchRequest)      returns (VerBranchResponse);
  rpc DeleteBranch          (VerBranchRequest)          returns (VerOkResponse);
  rpc CreateVersion         (VerCreateVersionRequest)   returns (VerVersionResponse);
  rpc ListVersions          (VerBranchRequest)          returns (VerListVersionsResponse);
  rpc ReadVersionSnapshot   (VerVersionRequest)         returns (VerGetSnapshotResponse);
  rpc DeleteVersion         (VerDeleteVersionRequest)   returns (VerOkResponse);
  rpc MergeBranch           (VerMergeRequest)           returns (VerMergeReportResponse);
}

message VerEmptyRequest {}

message VerNameRequest {
  string name = 1;
}

message VerBranchRequest {
  string name      = 1;
  string branch_id = 2;
}

message VerVersionRequest {
  string name      = 1;
  string branch_id = 2;
  string tag       = 3;
}

message VerRegisterNameRequest {
  string name                  = 1;
  string physical_document_id  = 2;
  string engine_type           = 3;
  string root_branch_id        = 4;
}

message VerDeleteNameRequest {
  string name    = 1;
  bool   cascade = 2;
}

message VerForkBranchRequest {
  string                      name           = 1;
  string                      from_branch_id = 2;
  string                      new_branch_id  = 3;
  google.protobuf.Int64Value  at_revision    = 4;
}

message VerCreateVersionRequest {
  string name      = 1;
  string branch_id = 2;
  string tag       = 3;
}

message VerDeleteVersionRequest {
  string name          = 1;
  string branch_id     = 2;
  string tag           = 3;
  bool   drop_snapshot = 4;
}

message VerMergeRequest {
  string name             = 1;
  string target_branch_id = 2;
  string source_branch_id = 3;
  bool   dry_run          = 4;
}

message VerOkResponse {}

message VerNameInfoProto {
  string                    name              = 1;
  string                    default_branch_id = 2;
  string                    engine_type       = 3;
  google.protobuf.Timestamp created_at        = 4;
}

message VerBranchProto {
  string                    name                  = 1;
  string                    branch_id             = 2;
  string                    physical_document_id  = 3;
  string                    fork_parent_branch_id = 4;
  int64                     fork_revision         = 5;
  google.protobuf.Timestamp created_at            = 6;
  bool                      is_read_only          = 7;
}

message VerVersionProto {
  string                    name                  = 1;
  string                    branch_id             = 2;
  string                    tag                   = 3;
  int64                     revision              = 4;
  string                    history_snapshot_name = 5;
  google.protobuf.Timestamp created_at            = 6;
}

message VerMergeReportProto {
  string source_branch_id   = 1;
  string target_branch_id   = 2;
  int32  rebased_op_count   = 3;
  int32  nullified_op_count = 4;
  bool   is_dry_run         = 5;
}

message VerNameInfoResponse {
  VerNameInfoProto name_info = 1;
}

message VerListNamesResponse {
  repeated VerNameInfoProto names = 1;
}

message VerBranchResponse {
  VerBranchProto branch = 1;
}

message VerListBranchesResponse {
  repeated VerBranchProto branches = 1;
}

message VerVersionResponse {
  VerVersionProto version = 1;
}

message VerListVersionsResponse {
  repeated VerVersionProto versions = 1;
}

message VerGetSnapshotResponse {
  bool             found    = 1;
  MgmtSnapshotProto snapshot = 2;
}

message VerMergeReportResponse {
  VerMergeReportProto merge_report = 1;
}

// ─── Comments service ─────────────────────────────────────────────────────────

service OpStreamCommentsService {
  rpc CreateComment    (CreateCommentRequest)    returns (CommentResponse);
  rpc EditComment      (EditCommentRequest)      returns (CommentResponse);
  rpc ResolveComment   (CommentActionRequest)    returns (CommentResponse);
  rpc DeleteComment    (CommentActionRequest)    returns (CommentOkResponse);
  rpc ListOpenComments (ListCommentsRequest)     returns (ListCommentsResponse);
  // Server-streaming push: client subscribes; server sends events as they arrive.
  rpc SubscribeComments (SubscribeCommentsRequest) returns (stream CommentEvent);
}

message CreateCommentRequest {
  string peer_id     = 1;
  string document_id = 2;
  string body        = 3;
  string anchor_json = 4;          // JSON-serialised Anchor; empty for replies
  string parent_comment_id = 5;    // empty for root comments
}

message EditCommentRequest {
  string peer_id     = 1;
  string document_id = 2;
  string comment_id  = 3;
  string new_body    = 4;
}

message CommentActionRequest {
  string peer_id     = 1;
  string document_id = 2;
  string comment_id  = 3;
}

message ListCommentsRequest {
  string document_id = 1;
}

message SubscribeCommentsRequest {
  string document_id = 1;
}

message CommentProto {
  string                    id                   = 1;
  string                    document_id          = 2;
  string                    parent_comment_id    = 3;
  string                    author_peer_id       = 4;
  string                    body                 = 5;
  string                    anchor_json          = 6;
  int64                     anchored_at_revision = 7;
  google.protobuf.Timestamp created_at           = 8;
  google.protobuf.Timestamp resolved_at          = 9;
  string                    resolved_by_peer_id  = 10;
  bool                      is_orphaned          = 11;
  string                    author_name          = 12;
}

message CommentResponse {
  bool         success       = 1;
  string       error_message = 2;
  CommentProto comment       = 3;
}

message CommentOkResponse {
  bool   success       = 1;
  string error_message = 2;
}

message ListCommentsResponse {
  repeated CommentProto comments = 1;
}

message CommentEvent {
  oneof event_type {
    CommentProto created = 1;
    CommentProto updated = 2;
    string       deleted_comment_id = 3;
  }
}
