syntax = "proto3";

import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";

option csharp_namespace = "OpStream.Shared.Messages.gRPC";

package opstream;

service OpStreamService {
  rpc Connect (stream ClientMessage) returns (stream ServerMessage);
}

service OpStreamManagementService {
  rpc ListDocuments    (MgmtListDocumentsRequest) returns (MgmtListDocumentsResponse);
  rpc GetDocumentInfo  (MgmtDocumentRequest)      returns (MgmtGetDocumentInfoResponse);
  rpc GetSnapshot      (MgmtDocumentRequest)      returns (MgmtGetSnapshotResponse);
  rpc DeleteDocument   (MgmtDocumentRequest)      returns (MgmtOkResponse);
  rpc CompactDocument  (MgmtRevisionRequest)      returns (MgmtOkResponse);
  rpc ListMilestones   (MgmtDocumentRequest)      returns (MgmtListMilestonesResponse);
  rpc PurgeHistory     (MgmtRevisionRequest)      returns (MgmtOkResponse);
  rpc PurgeTenant      (MgmtEmptyRequest)         returns (MgmtCountResponse);
}

message ClientMessage {
  string correlation_id = 1;
  oneof message_type {
    JoinRequest join_request = 2;
    OpRequest op_request = 3;
    AwarenessRequest awareness_request = 4;
  }
}

message ServerMessage {
  string correlation_id = 1;
  oneof message_type {
    JoinResponse join_response = 2;
    OpResponse op_response = 3;
    ReceiveOpEvent receive_op_event = 4;
    ReceiveAwarenessEvent receive_awareness_event = 5;
    PeerDisconnectedEvent peer_disconnected_event = 6;
    ErrorResponse error_response = 7;
  }
}

message JoinRequest {
  string document_id = 1;
  string document_type = 2;
  int32 client_proto_version = 3;
}

message JoinResponse {
  int64 revision = 1;
  bytes snapshot = 2;
  repeated AwarenessStateProto awareness = 3;
}

message OpRequest {
  string document_id = 1;
  bytes payload = 2;
  int64 base_revision = 3;
}

message OpResponse {
  bool success = 1;
  int64 new_revision = 2;
  string error_message = 3;
}

message AwarenessRequest {
  string document_id = 1;
  string data_json = 2; 
}

message ErrorResponse {
  string message = 1;
}

message ReceiveOpEvent {
  bytes payload = 1;
  int64 new_revision = 2;
}

message ReceiveAwarenessEvent {
  repeated AwarenessStateProto awareness = 1;
}

message AwarenessStateProto {
  string peer_id = 1;
  string data_json = 2; 
  google.protobuf.Timestamp last_updated = 3;
}

message PeerDisconnectedEvent {
  string peer_id = 1;
}

// ─── Management messages ──────────────────────────────────────────────────────

message MgmtEmptyRequest {}

message MgmtDocumentRequest {
  string document_id = 1;
}

message MgmtRevisionRequest {
  string document_id   = 1;
  int64  up_to_revision = 2;
}

message MgmtListDocumentsRequest {
  google.protobuf.Int32Value skip = 1;
  google.protobuf.Int32Value take = 2;
}

message MgmtOkResponse {}

message MgmtCountResponse {
  int32 count = 1;
}

message MgmtDocumentInfoProto {
  string                    document_id   = 1;
  int64                     revision      = 2;
  google.protobuf.Timestamp last_modified = 3;
  int64                     op_count      = 4;
}

message MgmtSnapshotProto {
  int64                     revision  = 1;
  google.protobuf.Timestamp timestamp = 2;
  bytes                     state     = 3;
}

message MgmtMilestoneProto {
  int64                     revision  = 1;
  google.protobuf.Timestamp timestamp = 2;
  string                    name      = 3;
}

message MgmtListDocumentsResponse {
  repeated MgmtDocumentInfoProto documents = 1;
}

message MgmtGetDocumentInfoResponse {
  bool                   found         = 1;
  MgmtDocumentInfoProto  document_info = 2;
}

message MgmtGetSnapshotResponse {
  bool             found    = 1;
  MgmtSnapshotProto snapshot = 2;
}

message MgmtListMilestonesResponse {
  repeated MgmtMilestoneProto milestones = 1;
}
