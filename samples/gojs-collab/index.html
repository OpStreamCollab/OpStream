<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpStream + GoJS — collaborative workflow editor</title>
    <link rel="stylesheet" href="./src/style.css" />
    <!-- GoJS evaluation build (watermarked). Commercial license: https://gojs.net -->
    <script src="https://cdn.jsdelivr.net/npm/gojs/release/go.js"></script>
</head>
<body>
    <div id="toolbar">
        <strong>Workflow editor</strong>
        <span class="sep"></span>
        <button id="undo" title="Undo (Ctrl+Z)">↶ Undo</button>
        <button id="redo" title="Redo (Ctrl+Y)">↷ Redo</button>
        <span class="sep"></span>
        <span class="swatches" id="swatches" title="Recolor selected node"></span>
        <span class="sep"></span>
        <button id="fit" class="ghost">Fit</button>
        <button id="del" class="ghost" title="Delete selection (Del)">Delete</button>
        <span class="hint">drag from the palette · drag a node's edge to link · double-click to rename</span>
        <span id="me">…</span>
        <span id="badge">OpStream · <span id="status">starting…</span></span>
    </div>

    <aside id="palette-pane">
        <h3>Palette</h3>
        <div id="palette"></div>
        <p class="palette-hint">Drag a shape onto the canvas.</p>
    </aside>

    <div id="diagram"></div>

    <aside id="sidebar">
        <div class="sec">
            <h3>Who's here</h3>
            <div id="peers" class="peers"></div>
        </div>
        <div class="sec grow">
            <h3 id="cmHead">Comments</h3>
            <div id="panel" class="panel"></div>
        </div>
        <div class="sec">
            <div id="addbox">
                <textarea id="cmBody" rows="2" placeholder="Select a node, then comment…"></textarea>
                <button id="cmAdd" disabled>Select a node first</button>
            </div>
        </div>
    </aside>

    <div id="overlay"></div>

    <script type="module" src="./src/main.js"></script>
</body>
</html>
