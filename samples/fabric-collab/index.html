<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpStream + Fabric.js — collaborative canvas</title>
    <link rel="stylesheet" href="./src/style.css" />
    <!-- Fabric.js v5 (MIT), unmodified, from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/fabric@5.3.0/dist/fabric.min.js"></script>
</head>
<body>
    <div id="toolbar">
        <strong>Collaborative canvas</strong>
        <button id="addRect">+ Rectangle</button>
        <button id="addCircle">+ Circle</button>
        <button id="addText">+ Text</button>
        <button id="del">Delete selected</button>
        <span id="badge">OpStream · <span id="status">starting…</span></span>
    </div>
    <canvas id="c"></canvas>
    <script type="module" src="./src/main.js"></script>
</body>
</html>
