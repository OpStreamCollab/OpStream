# Example stack: OpStream + PostgreSQL (storage) + Redis (backplane).
# Demonstrates every knob exposed via environment variables.
#
#   docker compose up --build
#   curl http://localhost:8080/health
#
services:

  opstream:
    build: .
    image: opstreamcollab/opstream:latest
    ports:
      - "8080:8080"
    environment:
      # ── Kestrel ─────────────────────────────────────────────────────────
      ASPNETCORE_URLS: "http://+:8080"

      # ── Transports (CSV: signalr, websockets, grpc) ─────────────────────
      OPSTREAM__TRANSPORTS: "signalr,websockets,grpc"
      OPSTREAM__SIGNALR__PATH: "/collab"
      OPSTREAM__WEBSOCKETS__PATH: "/collab-ws"

      # ── Engines (CSV: text, json, rich-text, table, form, tree) ─────────
      OPSTREAM__ENGINES: "text,json,rich-text,form"

      # ── Storage ─────────────────────────────────────────────────────────
      # Providers: memory | postgres | mysql | sqlserver | sqlite | mongo | redis
      #OPSTREAM__STORAGE__PROVIDER: "postgres"
      #OPSTREAM__STORAGE__CONNECTIONSTRING: "Host=postgres;Port=5432;Database=opstream;Username=opstream;Password=opstream"
      # For mongo only:
      # OPSTREAM__STORAGE__DATABASENAME: "opstream"

      # ── Backplane ───────────────────────────────────────────────────────
      # Providers: local | redis
      OPSTREAM__BACKPLANE__PROVIDER: "local"
      #OPSTREAM__BACKPLANE__CONNECTIONSTRING: "redis:6379"
    depends_on:
      #postgres:
      #  condition: service_healthy
      redis:
        condition: service_healthy



  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10


